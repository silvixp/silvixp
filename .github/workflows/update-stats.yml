name: Update GitHub Stats

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Note: We are using two different API providers to ensure reliability
      - name: Download Stats Cards
        run: |
          # 1. General Stats (Includes private commits/stars)
          curl -H "Authorization: token ${{ secrets.GH_TOKEN }}" -o profile-stats.svg "https://github-readme-stats.vercel.app/api?username=silvixp&show_icons=true&count_private=true&theme=tokyonight&rank_icon=github"
          
          # 2. Activity Graph (Improved Labels & Styling)
          # 'custom_title' renames the graph
          # 'area=true' makes the line a filled-in wave
          curl -o profile-graph.svg "https://github-readme-activity-graph.vercel.app/graph?username=silvixp&theme=tokyo-night&area=true&hide_border=true&point_size=0&custom_title=Weekly%20Contribution%20Momentum"

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile-stats.svg profile-graph.svg
          
          if git diff --staged --quiet; then
            echo "No changes, skipping push."
            exit 0
          fi

          git commit -m "Update GitHub stats [skip ci]"
          git pull --rebase origin main
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
