name: Update GitHub Stats

on:
  schedule:
    - cron: '0 0 * * 0' # Runs every Sunday at midnight
  workflow_dispatch:      # Allows manual trigger

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Generate Main Stats Card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          # Added: rank_icon, tokyonight theme, and private stats
          options: "username=silvixp&show_icons=true&count_private=true&theme=tokyonight&rank_icon=github&show_owner=true"
          path: profile-stats.svg
          token: ${{ secrets.GH_TOKEN }}

      - name: Generate Top Languages Card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: languages
          # Added: compact layout to fit side-by-side, hiding common clutter like HTML/CSS
          options: "username=silvixp&layout=compact&theme=tokyonight&hide=html,css&count_private=true"
          path: profile-langs.svg
          token: ${{ secrets.GH_TOKEN }}

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add profile-stats.svg profile-langs.svg
          
          if git diff --staged --quiet; then
            echo "No changes to stats, skipping push."
            exit 0
          fi

          git commit -m "Update GitHub stats [skip ci]"
          git pull --rebase origin main
          git push origin main
