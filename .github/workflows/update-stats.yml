name: Update GitHub Stats

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Clean Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GH_TOKEN }}
          filename: profile-stats.svg
          
          # Use the 'repository' template for a much cleaner, spaced-out layout
          template: repository
          config_theme: tokyonight
          
          # Focus only on high-value data
          base: header, activity, repositories
          base_indepth: yes
          
          # The "Sleek" Graph: Using the 'activity' plugin instead of the 3D calendar
          # This creates a very clean line/bar chart of your recent momentum
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 14
          plugin_activity_filter: push, issue, pr
          
          # Styling adjustments for a minimal look
          config_padding: 0, 5%
          output_action: commit
          committer_branch: main
