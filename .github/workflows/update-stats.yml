name: Update GitHub Stats

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Generate Main Stats Card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: "username=silvixp&show_icons=true&count_private=true&theme=tokyonight&rank_icon=github"
          path: profile-stats.svg
          token: ${{ secrets.GH_TOKEN }}

      - name: Generate Top Languages Card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: languages
          options: "username=silvixp&layout=compact&theme=tokyonight&hide=html,css&count_private=true"
          path: profile-langs.svg
          token: ${{ secrets.GH_TOKEN }}

      - name: Generate Contribution Graph
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: activity-graph
          # This creates a wide, sleek line graph of your weekly activity
          options: "username=silvixp&theme=tokyonight&area=true&hide_border=true"
          path: profile-graph.svg
          token: ${{ secrets.GH_TOKEN }}

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add *.svg
          if git diff --staged --quiet; then
            echo "No changes, skipping."
            exit 0
          fi
          git commit -m "Update GitHub stats [skip ci]"
          git pull --rebase
