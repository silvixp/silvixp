name: Update GitHub Stats

on:
  schedule:
    - cron: '0 0 * * 0' # Runs every Sunday at midnight
  workflow_dispatch:      # Allows manual trigger

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Professional Metrics
        uses: lowlighter/metrics@latest
        with:
          # Your PAT is required to see private/company data
          token: ${{ secrets.GH_TOKEN }}
          
          # Output file name
          filename: profile-stats.svg
          
          # Core Settings
          base: header, activity, community, repositories, metadata
          config_timezone: UTC
          base_indepth: yes          # Forces deep scan of all commits (Fixes the "10 commits" issue)
          
          # Activity Graph (Isometric Calendar)
          # This replaces the "weird" graph with a professional 3D activity view
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          
          # Styling
          config_order: base.header, isocalendar, base.activity, base.repositories
          template: classic
          config_theme: tokyonight   # Matches your preferred dark theme
          
          # Private Data Handling
          config_padding: 0, 8%
          output_action: commit      # Automatically commits the file to your repo
          committer_branch: main
          committer_message: "Update GitHub metrics [skip ci]"
