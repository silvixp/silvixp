name: Update GitHub Stats

on:
  schedule:
    - cron: '0 0 * * 0' 
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # Using the default GITHUB_TOKEN is fine now that permissions are set
          fetch-depth: 0 

      - name: Generate Stats Card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: "username=silvixp&show_icons=true&count_private=true"
          path: profile-stats.svg
          token: ${{ secrets.GH_TOKEN }} # This PAT is still needed to see private repos

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add profile-stats.svg
          
          # Only commit if the SVG actually changed
          if git diff --staged --quiet; then
            echo "No changes to stats, skipping push."
            exit 0
          fi

          git commit -m "Update GitHub stats [skip ci]"
          
          # Rebase handles the "out of sync" issue gracefully
          git pull --rebase origin main
          git push origin main
