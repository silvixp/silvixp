name: Update GitHub Stats

on:
  schedule:
    - cron: '0 0 * * 0' # Runs every Sunday at midnight
  workflow_dispatch:      # Allows you to run it manually to test

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Stats Cards
        run: |
          # 1. General Stats (Includes private commits/stars)
          curl -H "Authorization: token ${{ secrets.GH_TOKEN }}" -o profile-stats.svg "https://github-readme-stats.vercel.app/api?username=silvixp&show_icons=true&count_private=true&theme=tokyonight&rank_icon=github"
          
          # 2. Top Languages (Includes private repo analysis)
          curl -H "Authorization: token ${{ secrets.GH_TOKEN }}" -o profile-langs.svg "https://github-readme-stats.vercel.app/api/top-langs/?username=silvixp&layout=compact&theme=tokyonight&hide=html,css&count_private=true"
          
          # 3. Activity Graph (Visualizes your weekly contribution pulse)
          curl -o profile-graph.svg "https://github-readme-activity-graph.vercel.app/graph?username=silvixp&theme=tokyo-night&area=true&hide_border=true&point_size=0"

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add profile-stats.svg profile-langs.svg profile-graph.svg
          
          if git diff --staged --quiet; then
            echo "No changes, skipping push."
            exit 0
          fi

          git commit -m "Update GitHub stats [skip ci]"
          git pull --rebase origin main
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
