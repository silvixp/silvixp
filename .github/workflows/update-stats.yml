name: Update GitHub Stats

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Stats Cards
        run: |
          # Define the base URL with your theme and private count
          BASE_URL="https://github-readme-stats.vercel.app/api"
          PARAMS="username=silvixp&show_icons=true&count_private=true&theme=tokyonight"

          # 1. Main Stats
          curl -o profile-stats.svg "${BASE_URL}?${PARAMS}&rank_icon=github"
          
          # 2. Top Languages
          curl -o profile-langs.svg "${BASE_URL}/top-langs?${PARAMS}&layout=compact&hide=html,css"
          
          # 3. Activity Graph (Using the official Activity Graph API)
          curl -o profile-graph.svg "https://github-readme-activity-graph.vercel.app/graph?username=silvixp&theme=tokyo-night&area=true&hide_border=true"

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add *.svg
          
          if git diff --staged --quiet; then
            echo "No changes, skipping."
            exit 0
          fi

          git commit -m "Update GitHub stats [skip ci]"
          git pull --rebase origin main
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
