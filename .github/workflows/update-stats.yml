name: Update GitHub Stats

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write  # This gives the bot permission to push the SVG

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GH_TOKEN }} 

      - name: Generate Stats Card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          # Add your options here just like the URL params
          options: "username=silvixp&show_icons=true&count_private=true"
          path: profile-stats.svg
          token: ${{ secrets.GH_TOKEN }}

      - name: Commit and Push
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }} 
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Stage the file
          git add profile-stats.svg
          
          # Only commit if there are changes
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update GitHub stats"
          
          # FORCE PUSH to override the history mismatch
          git push origin main --force
